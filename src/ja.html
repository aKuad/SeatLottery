<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="aKuad">
    <meta name="creator" content="aKuad">
    <meta name="description" content="入力された氏名、座席情報から、席順をランダムに割り振った座席表を生成するプログラムです。">
    <meta name="keywords" content="座席,座席表,抽選">
    <meta property="og:title" content="SeatLottery">
    <meta property="og:type" content="website">
    <meta property="og:description" content="入力された氏名、座席情報から、席順をランダムに割り振った座席表を生成するプログラムです。">
    <meta property="og:image" content="./usage/images-ja/screen-ja-1-top.webp">
    <meta property="og:url" content="https://akuad.github.io/SeatLottery/ja.html">
    <link rel="stylesheet" href="./styles/InputCheck.css">
    <link rel="stylesheet" href="./styles/SeatEditor.css">
    <link rel="stylesheet" href="./styles/paper.css">
    <link rel="stylesheet" href="./styles/base.css">
    <title>座席抽選プログラム</title>
    <script type="text/javascript" charset="UTF-8" src="./scripts/InputCheck.js"></script>
    <script type="text/javascript" charset="UTF-8" src="./scripts/SeatEditor.js"></script>
    <script type="text/javascript" charset="UTF-8" src="./scripts/MemberEditor.js"></script>
    <script type="text/javascript" charset="UTF-8" src="./scripts/array_shuffle.js"></script>
    <script type="text/javascript" charset="UTF-8" src="./scripts/export_as_download.js"></script>
    <script type="text/javascript" charset="UTF-8" src="./scripts/print_seatresult.js"></script>
    <script type="text/javascript" charset="UTF-8" src="./scripts/main.js"></script>
  </head>

  <body>
    <div id="view-seatset">
      <h1>座席抽選プログラム</h1>
      <div class="info-container" style="text-align: center;"><a href="https://akuad.github.io/SeatLottery/usage/ja.html" target="_blank">使い方</a> | <a href="https://github.com/aKuad/SeatLottery" target="_blank">ソースコード</a> | <a href="./index.html">English</a></div>
      <div class="info-container">座席レイアウト、登録メンバーを編集してください。</div>
      <div class="info-container">
        <div class="info-label">ステータス</div>
        <table class="table-bodybase">
          <tbody>
            <tr>
              <td class="table-cellbase table-rborder">一般</td>
              <td class="table-cellbase">座席数:</td>
              <td class="table-cellbase table-rborder" id="stat-normal-seats"></td>
              <td class="table-cellbase">メンバー数:</td>
              <td class="table-cellbase" id="stat-normal-members"></td>
            </tr>
            <tr>
              <td class="table-cellbase table-rborder">優先</td>
              <td class="table-cellbase">座席数:</td>
              <td class="table-cellbase table-rborder" id="stat-priority-seats"></td>
              <td class="table-cellbase">メンバー数:</td>
              <td class="table-cellbase" id="stat-priority-members"></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="info-container" style="text-align: center;">
        <button class="button-prime" id="ctrl-generate" disabled>座席表を生成</button>
      </div>
      <div class="info-container" style="text-align: center;">
        <div class="info-label">メンバー</div>
        <textarea id="input-members" placeholder="1,鈴木 太郎,スズキ タロウ,0"></textarea>
        <label class="button-normal button-arrow-up" for="input-members-file">
          テキストファイルを入力
          <input type="file" id="input-members-file" class="input-core-overwrap" accept=".txt,.csv">
        </label>
        <button id="members-delete" class="button-danger">削除</button>
      </div>
      <div class="info-container">
        <div class="info-label">座席数 (横 x 縦)</div>
        <div style="text-align: center;">
          <input type="number" id="input-seats-x" min="1" max="20" value="6"> x
          <input type="number" id="input-seats-y" min="1" max="20" value="5">
        </div>
      </div>
      <div class="info-container" style="text-align: center; margin-bottom: 0;">
        レイアウトファイル:
        <label class="button-normal button-arrow-down">
          入力
          <input type="file" id="input-layout-file" class="input-core-overwrap" accept=".json">
        </label>
        <button id="output-layout-file" class="button-normal button-arrow-down-to-up" >出力</button>
        <button id="layout-reset" class="button-danger">リセット</button>
      </div>
      <div id="seat-edit"></div>
      <div class="doc-table">教卓</div>
    </div>

    <div id="view-result" style="display: none;">
      <div class="info-container no-print">必要に応じ、印刷ダイアログから拡大率、用紙方向などを調整してください。</div>
      <div class="info-container no-print">Excel などでレイアウトを独自に作成しますか？「CSVエクスポート」をご活用ください。</div>
      <div class="info-container no-print" style="text-align: center;">
        <button class="button-normal" id="ctrl-back">前へ戻る</button>
        <button class="button-prime" onclick="window.print();">印刷</button>
        <a class="button-prime" id="ctrl-export" href="" download="Seat.csv">CSVエクスポート</a>
      </div>
      <input type="text" class="doc-title" placeholder="タイトル入力 (任意)">
      <div id="seat-result"></div>
      <div class="doc-table">教卓</div>
      <textarea class="doc-desc" placeholder="備考入力 (任意), 右下の角をドラッグしてサイズ変更"></textarea>
    </div>
  </body>
</html>
